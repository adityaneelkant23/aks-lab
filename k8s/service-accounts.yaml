# =============================================================
# service-accounts.yaml - Kubernetes Service Accounts
# =============================================================
# Service Account = an identity for a POD (not a person)
# Just like a user account lets YOU login, a service account
# lets a POD authenticate to Kubernetes API or Azure services.
#
# WHY SERVICE ACCOUNTS?
#   Without: pod has no identity → can't talk to Azure (no key vault, no storage)
#   With:    pod has a managed identity → AKS links it to Azure Managed Identity
#            pod can call Azure APIs without any hardcoded passwords
#
# This is called WORKLOAD IDENTITY (modern, secure way)
# Old way = store Azure passwords in Kubernetes secrets (BAD, don't do this)
#
# Our service accounts:
#   sa-hello-world   (ns-apps)    = identity for hello-world app pods
#   sa-db-accessor   (ns-apps)    = identity for any pod that needs database access
#
# In your office:
#   sa-documentum    (ns-apps)    = Documentum pods use this to access Azure SQL/Storage
#   sa-monitoring    (ns-monitor) = Prometheus uses this to scrape metrics
# =============================================================

# Service Account for the Hello World application
# Pods using this SA can be granted Azure RBAC permissions
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-hello-world
  namespace: ns-apps
  labels:
    app: hello-world
    managed-by: bicep-lab
  annotations:
    # Uncomment and fill in when linking to Azure Managed Identity (Workload Identity)
    # azure.workload.identity/client-id: "<AZURE_MANAGED_IDENTITY_CLIENT_ID>"
    description: "Service account for hello-world application pods"
---
# Service Account for database-accessing workloads
# Grant this SA access to Azure SQL or Storage via Azure RBAC
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-db-accessor
  namespace: ns-apps
  labels:
    app: db-accessor
    managed-by: bicep-lab
  annotations:
    # Uncomment and fill in when linking to Azure Managed Identity
    # azure.workload.identity/client-id: "<AZURE_MANAGED_IDENTITY_CLIENT_ID>"
    description: "Service account for pods that need database or storage access"
